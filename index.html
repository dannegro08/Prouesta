<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi novia?</title>
    <style>
        body {
            background-color: #ffdeeb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .contenedor {
            text-align: center;
            padding: 20px;
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #d32f2f;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .contenedor-img {
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        img {
            max-height: 100%;
            border-radius: 10px;
        }

        .botones {
            display: flex;
            justify-content: center;
            gap: 40px;
            height: 60px;
            position: relative;
            margin-top: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2em;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btnSi {
            background-color: #4caf50;
            color: white;
            order: 1;
        }

        #btnNo {
            background-color: #f44336;
            color: white;
            position: absolute;
            z-index: 10;
            order: 2;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 id="pregunta">¿Me quieres?</h1>
        
        <div class="contenedor-img">
            <img src="https://media.giphy.com/media/c76IJLufpNwSULPk77/giphy.gif" alt="ositos" id="imagen">
        </div>
        
        <div class="botones">
            <button id="btnSi">Sí</button>
            <button id="btnNo">No</button>
        </div>
    </div>

    <script>
        const btnNo = document.querySelector("#btnNo");
        const btnSi = document.querySelector("#btnSi");
        const pregunta = document.querySelector("#pregunta");
        const imagen = document.querySelector("#imagen");

        // Separación inicial fija del botón No para que no empiece encimado
        setTimeout(() => {
            btnNo.style.left = "60%";
        }, 150);

        btnNo.addEventListener("mouseover", moverBoton);
        btnNo.addEventListener("touchstart", (e) => {
            e.preventDefault(); 
            moverBoton();
        });

        function moverBoton() {
            btnNo.style.position = "fixed";
            
            const anchoPantalla = window.innerWidth - btnNo.offsetWidth - 20;
            const altoPantalla = window.innerHeight - btnNo.offsetHeight - 20;
            
            const randomX = Math.max(10, Math.floor(Math.random() * anchoPantalla));
            const randomY = Math.max(10, Math.floor(Math.random() * altoPantalla));
            
            btnNo.style.left = `${randomX}px`;
            btnNo.style.top = `${randomY}px`;
        }

        btnSi.addEventListener("click", function() {
            pregunta.innerText = "¡Sabía que dirías que sí! ❤️";
            // Imagen de celebración alternativa estable
            imagen.src = "https://media.giphy.com/media/mdN9rUEWcoSclUv80R/giphy.gif";
            btnNo.style.display = "none"; 
        });
    </script>
</body>
</html>
